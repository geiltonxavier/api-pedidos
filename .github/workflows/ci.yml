name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore OrdersApi.slnx

      - name: Build
        run: dotnet build OrdersApi.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test OrdersApi.slnx --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage"
